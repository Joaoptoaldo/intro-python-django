{% extends 'base.html' %}

{% block page_title %}
  Excluir Tarefa
{% endblock page_title %}

{% block content %}
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <div class="d-flex align-items-start justify-content-between gap-3">
        <div>
          <h1 class="h3 mb-2">Excluir Tarefa?</h1>
          <p class="text-body-secondary mb-4">Tem certeza que deseja excluír a tarefa <strong>{{ todo.title }}</strong>?</p>
        </div>
        <div class="text-danger">
          <i class="bi bi-exclamation-triangle-fill fs-1"></i>
        </div>
      </div>

      <div class="d-flex flex-wrap gap-2">
        <form method="POST" class="mb-0">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger d-inline-flex align-items-center gap-2">
            <i class="bi bi-trash-fill"></i>
            Excluir
          </button>
        </form>

        <a href="{% url 'todo_list' %}" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">
          <i class="bi bi-arrow-left"></i>
          Cancelar
        </a>
      </div>
    </div>
  </div>
{% endblock content %}
